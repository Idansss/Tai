name: Backend CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10.20.0
      - uses: actions/setup-node@v7
        with:
          node-version: 22.18.0
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm db:validate
      # pnpm 10 uses npm audit endpoints that were retired in 2026. Keep the
      # workspace install pinned while using pnpm 11's bulk-advisory client.
      - run: corepack pnpm@11.13.0 --pm-on-fail=ignore audit --audit-level high --prod
