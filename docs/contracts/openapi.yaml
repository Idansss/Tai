        quantity: { type: integer, minimum: 1, maximum: 100 }
    GarmentConfigurationValidationResponse:
      type: object
      required: [data, meta]
      properties:
        data: { $ref: '#/components/schemas/GarmentConfigurationValidation' }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    SaveDesignInput:
      type: object
      required: [artworkVersionId, garmentVariantId, placementId, scalePreset, view]
      description: >
        The approved tuple only. Quantity is deliberately absent because it is a cart concern,
        not part of a design's identity. Freeform print geometry and crop are never accepted;
        see ADR-013.
      properties:
        artworkVersionId: { type: string, format: uuid }
        garmentVariantId: { type: string, format: uuid }
        placementId: { type: string, format: uuid }
        scalePreset: { type: string, maxLength: 64, pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$' }
        view: { type: string, enum: [FRONT, BACK] }
        name: { type: string, minLength: 1, maxLength: 120 }
      additionalProperties: false
    UpdateDesignInput:
      type: object
      minProperties: 1
      properties:
        name: { type: string, minLength: 1, maxLength: 120, nullable: true }
        visibility: { type: string, enum: [PRIVATE, UNLISTED] }
      additionalProperties: false
    DesignConfiguration:
      type: object
      required:
        [
          id,
          artworkId,
          artworkVersionId,
          garmentTemplateId,
          garmentVariantId,
          placementId,
          scalePresetId,
          view,
          configurationHash,
          name,
          visibility,
          shareToken,
          createdAt,
          updatedAt,
        ]
      properties:
        id: { type: string, format: uuid }
        artworkId: { type: string, format: uuid }
        artworkVersionId: { type: string, format: uuid }
        garmentTemplateId: { type: string, format: uuid }
        garmentVariantId: { type: string, format: uuid }
        placementId: { type: string, format: uuid }
        scalePresetId: { type: string, format: uuid }
        view: { type: string, enum: [FRONT, BACK] }
        configurationHash:
          type: string
          pattern: '^[0-9a-f]{64}$'
          description: Deterministic SHA-256 of the approved tuple; identical designs share one hash.
        name: { type: string, nullable: true, maxLength: 120 }
        visibility: { type: string, enum: [PRIVATE, UNLISTED] }
        shareToken:
          type: string
          nullable: true
          description: Present only while the design is UNLISTED and its owner is reading it. A shared read never returns it.
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    DesignResponse:
      type: object
      required: [data, meta]
