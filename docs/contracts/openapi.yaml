          required: [items, nextCursor]
          properties:
            items:
              type: array
              items: { $ref: '#/components/schemas/Artwork' }
            nextCursor: { type: [string, 'null'], format: uuid }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    AdminArtworkPageResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [items, nextCursor]
          properties:
            items:
              type: array
              items: { $ref: '#/components/schemas/AdminArtwork' }
            nextCursor: { type: [string, 'null'], format: uuid }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    HealthResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [status, service, timestamp]
          properties:
            status: { type: string, const: ok }
            service: { type: string, const: api }
            timestamp: { type: string, format: date-time }
        meta:
          $ref: '#/components/schemas/ApiMeta'
    ApiMeta:
      type: object
      required: [correlationId]
      properties:
        correlationId: { type: string }
    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, correlationId]
          properties:
            code:
              type: string
              enum:
                [
                  VALIDATION_FAILED,
                  AUTHENTICATION_REQUIRED,
                  AUTHENTICATION_INVALID,
                  EMAIL_VERIFICATION_REQUIRED,
                  TOKEN_INVALID_OR_EXPIRED,
                  SESSION_INVALID,
                  ADMIN_MFA_REQUIRED,
                  MFA_CHALLENGE_INVALID,
                  MFA_CODE_INVALID,
                  PERMISSION_DENIED,
                  RESOURCE_NOT_FOUND,
                  CONFLICT,
                  RATE_LIMITED,
                  IDEMPOTENCY_CONFLICT,
                  INVENTORY_UNAVAILABLE,
                  INTEGRATION_UNAVAILABLE,
                  INTERNAL_ERROR,
                ]
            message: { type: string }
            correlationId: { type: string }
