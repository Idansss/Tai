components:
  parameters:
    Cursor:
      name: cursor
      in: query
      schema: { type: string, format: uuid }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    CatalogueId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    CatalogueSlug:
      name: slug
      in: path
      required: true
      schema: { type: string, maxLength: 160, pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$' }
    ArtworkId:
      name: artworkId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ArtworkVersionId:
      name: versionId
      in: path
      required: true
      schema: { type: string, format: uuid }
  securitySchemes:
    tms_session:
      type: apiKey
      in: cookie
      name: tms_session
    tms_admin_session:
      type: apiKey
      in: cookie
      name: tms_admin_session
  responses:
    ApiError:
      description: The request could not be completed.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
    Tag:
      description: Catalogue tag.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/TagResponse' }
    TagList:
      description: Catalogue tags.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/TagListResponse' }
    CatalogueEntry:
      description: Curated collection.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/CatalogueEntryResponse' }
    CatalogueList:
      description: Curated collections.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/CatalogueListResponse' }
    CataloguePage:
      description: Cursor page of published curated collections.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/CataloguePageResponse' }
    Drop:
      description: Timed drop.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/DropResponse' }
    DropList:
      description: Timed drops.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/DropListResponse' }
    DropPage:
      description: Cursor page of published timed drops.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/DropPageResponse' }
    Edition:
      description: Artwork edition.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/EditionResponse' }
    EditionList:
      description: Artwork editions.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/EditionListResponse' }
    Story:
      description: Editorial story with ordered blocks.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/StoryResponse' }
    StoryList:
      description: Editorial stories.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/StoryListResponse' }
    StoryPage:
      description: Cursor page of published editorial stories.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/StoryPageResponse' }
    Association:
      description: Artwork association.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/AssociationResponse' }
  schemas:
    CustomerRegistrationInput:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email: { type: string, format: email, maxLength: 320 }
        password: { type: string, format: password, minLength: 12, maxLength: 128 }
        displayName: { type: string, minLength: 1, maxLength: 100 }
    CustomerLoginInput:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email: { type: string, format: email, maxLength: 320 }
        password: { type: string, format: password, minLength: 1, maxLength: 128 }
    AuthEmailInput:
      type: object
      additionalProperties: false
      required: [email]
      properties:
        email: { type: string, format: email, maxLength: 320 }
    AuthTokenInput:
      type: object
      additionalProperties: false
      required: [token]
      properties:
        token: { type: string, minLength: 43, maxLength: 43, pattern: '^[A-Za-z0-9_-]{43}$' }
    PasswordResetConfirmationInput:
      type: object
      additionalProperties: false
      required: [token, password]
      properties:
        token: { type: string, minLength: 43, maxLength: 43, pattern: '^[A-Za-z0-9_-]{43}$' }
        password: { type: string, format: password, minLength: 12, maxLength: 128 }
    AuthUser:
      type: object
      required: [id, email, status, emailVerifiedAt, displayName]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        status: { type: string, enum: [PENDING_VERIFICATION, ACTIVE] }
        emailVerifiedAt: { type: [string, 'null'], format: date-time }
        displayName: { type: [string, 'null'] }
    AuthSession:
      type: object
      required: [id, expiresAt, user]
      properties:
        id: { type: string, format: uuid }
        expiresAt: { type: string, format: date-time }
        user: { $ref: '#/components/schemas/AuthUser' }
    AuthSessionResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [session]
          properties:
            session: { $ref: '#/components/schemas/AuthSession' }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    AuthRegistrationResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [user, verificationRequired]
          properties:
            user: { $ref: '#/components/schemas/AuthUser' }
            verificationRequired: { type: boolean, const: true }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    AuthAcceptedResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [accepted]
          properties:
            accepted: { type: boolean, const: true }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    AdminLoginInput:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email: { type: string, format: email, maxLength: 320 }
        password: { type: string, format: password, minLength: 1, maxLength: 128 }
    AdminMfaChallengeInput:
      type: object
      additionalProperties: false
      required: [challengeToken]
      properties:
        challengeToken:
          { type: string, minLength: 43, maxLength: 43, pattern: '^[A-Za-z0-9_-]{43}$' }
    AdminMfaCodeInput:
      type: object
      additionalProperties: false
      required: [challengeToken, code]
      properties:
        challengeToken:
          { type: string, minLength: 43, maxLength: 43, pattern: '^[A-Za-z0-9_-]{43}$' }
        code: { type: string, pattern: '^\d{6}$' }
    AdminRoleAssignmentInput:
      type: object
      additionalProperties: false
      properties:
        expiresAt: { type: [string, 'null'], format: date-time }
    AdminUser:
      type: object
      required: [id, email, name, roles, permissions, mfaRequired, mfaEnrolled]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        name: { type: string, minLength: 1, maxLength: 100 }
        roles:
          type: array
          uniqueItems: true
          items: { type: string }
        permissions:
          type: array
          uniqueItems: true
          items: { type: string, pattern: '^[a-z][a-z0-9_]*\.[a-z][a-z0-9_]*$' }
        mfaRequired: { type: boolean }
        mfaEnrolled: { type: boolean }
    AdminSession:
      type: object
      required: [id, expiresAt, assuranceLevel, user]
      properties:
        id: { type: string, format: uuid }
        expiresAt: { type: string, format: date-time }
        assuranceLevel: { type: string, enum: [PASSWORD, MFA] }
        user: { $ref: '#/components/schemas/AdminUser' }
    AdminAuthChallenge:
      type: object
      required: [status, challengeToken, expiresAt]
      properties:
        status: { type: string, enum: [MFA_ENROLLMENT_REQUIRED, MFA_REQUIRED] }
        challengeToken: { type: string, minLength: 43, maxLength: 43 }
        expiresAt: { type: string, format: date-time }
    AdminLoginResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          oneOf:
            - type: object
              additionalProperties: false
              required: [session]
              properties:
                session: { $ref: '#/components/schemas/AdminSession' }
            - type: object
              additionalProperties: false
              required: [challenge]
              properties:
                challenge: { $ref: '#/components/schemas/AdminAuthChallenge' }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    AdminSessionResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [session]
          properties:
            session: { $ref: '#/components/schemas/AdminSession' }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    AdminTotpEnrollmentResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [enrollment]
          properties:
            enrollment:
              type: object
              required: [secret, otpauthUri]
              properties:
                secret: { type: string, pattern: '^[A-Z2-7]+$' }
                otpauthUri: { type: string, format: uri }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    AdminRole:
      type: object
      required: [code, name, description, permissions]
      properties:
        code: { type: string }
        name: { type: string }
        description: { type: [string, 'null'] }
        permissions:
          type: array
          uniqueItems: true
          items: { type: string }
    AdminRolesResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [roles]
          properties:
            roles:
              type: array
              items: { $ref: '#/components/schemas/AdminRole' }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    TagKind:
      type: string
      enum: [GENERAL, THEME, MOOD, COLOUR_FAMILY]
    TagInput:
      type: object
      additionalProperties: false
      required: [slug, name]
      properties:
