        '200': { $ref: '#/components/responses/Design' }
        '401': { $ref: '#/components/responses/ApiError' }
        '404': { $ref: '#/components/responses/ApiError' }
  /api/v1/shared-designs/{token}:
    get:
      operationId: getSharedDesign
