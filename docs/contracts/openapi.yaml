        story: { type: [string, 'null'], maxLength: 10000 }
        inspiration: { type: [string, 'null'], maxLength: 5000 }
        metadata:
          type: object
          additionalProperties: true
    ArtworkCreateInput:
      type: object
      additionalProperties: false
