      type: object
      required:
        [
          id,
          versionNumber,
          status,
          title,
          shortStory,
          story,
          inspiration,
          metadata,
          publishedAt,
          archivedAt,
          createdAt,
        ]
      properties:
        id: { type: string, format: uuid }
        versionNumber: { type: integer, minimum: 1 }
        status: { $ref: '#/components/schemas/ArtworkStatus' }
        title: { type: string }
        shortStory: { type: [string, 'null'] }
        story: { type: [string, 'null'] }
        inspiration: { type: [string, 'null'] }
        metadata:
          type: object
          additionalProperties: true
        publishedAt: { type: [string, 'null'], format: date-time }
        archivedAt: { type: [string, 'null'], format: date-time }
        createdAt: { type: string, format: date-time }
    Artwork:
      type: object
      required: [id, slug, status, publishedVersion, createdAt, updatedAt, publishedAt, archivedAt]
      properties:
        id: { type: string, format: uuid }
        slug: { type: string, maxLength: 160, pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$' }
        status: { $ref: '#/components/schemas/ArtworkStatus' }
        publishedVersion:
          oneOf:
            - $ref: '#/components/schemas/ArtworkVersion'
