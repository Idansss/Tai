openapi: 3.1.0
info:
  title: Tai Manic Studios API
  version: 1.0.0
  description: Versioned backend contract for storefront and administration clients.
servers:
  - url: http://localhost:4000
    description: Local development
tags:
  - name: health
  - name: authentication
  - name: admin-authentication
  - name: admin-access
  - name: artworks
  - name: administrator-artworks
paths:
  /api/v1/auth/register:
    post:
      operationId: registerCustomer
      tags: [authentication]
      summary: Register a customer account
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CustomerRegistrationInput' }
      responses:
        '201':
          description: The customer account was created and requires email verification.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthRegistrationResponse' }
        '400': { $ref: '#/components/responses/ApiError' }
        '409': { $ref: '#/components/responses/ApiError' }
        '429': { $ref: '#/components/responses/ApiError' }
        '503': { $ref: '#/components/responses/ApiError' }
  /api/v1/auth/login:
    post:
      operationId: loginCustomer
      tags: [authentication]
      summary: Create a customer session
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CustomerLoginInput' }
      responses:
        '200':
          description: The session was created and returned as a secure HttpOnly cookie.
          headers:
            Set-Cookie:
              schema: { type: string }
              description: HttpOnly, SameSite=Lax customer session cookie; Secure in production.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthSessionResponse' }
        '400': { $ref: '#/components/responses/ApiError' }
        '401': { $ref: '#/components/responses/ApiError' }
        '403': { $ref: '#/components/responses/ApiError' }
        '429': { $ref: '#/components/responses/ApiError' }
  /api/v1/auth/logout:
    post:
      operationId: logoutCustomer
      tags: [authentication]
      summary: Revoke the current customer session when present
      responses:
        '204': { description: The session was revoked when present. }
  /api/v1/auth/email-verification/request:
    post:
      operationId: requestCustomerEmailVerification
      tags: [authentication]
      summary: Request an email-verification link without disclosing account state
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AuthEmailInput' }
      responses:
        '202':
          description: The request was accepted.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthAcceptedResponse' }
        '400': { $ref: '#/components/responses/ApiError' }
        '429': { $ref: '#/components/responses/ApiError' }
  /api/v1/auth/email-verification/confirm:
    post:
      operationId: confirmCustomerEmailVerification
      tags: [authentication]
      summary: Verify a customer email address and create a session
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AuthTokenInput' }
      responses:
        '200':
          description: The email address was verified and a session was created.
          headers:
            Set-Cookie:
              schema: { type: string }
              description: HttpOnly, SameSite=Lax customer session cookie; Secure in production.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthSessionResponse' }
        '400': { $ref: '#/components/responses/ApiError' }
        '429': { $ref: '#/components/responses/ApiError' }
  /api/v1/auth/password-reset/request:
    post:
      operationId: requestCustomerPasswordReset
      tags: [authentication]
      summary: Request a password-reset link without disclosing account state
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AuthEmailInput' }
      responses:
        '202':
          description: The request was accepted.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthAcceptedResponse' }
        '400': { $ref: '#/components/responses/ApiError' }
        '429': { $ref: '#/components/responses/ApiError' }
  /api/v1/auth/password-reset/confirm:
    post:
      operationId: confirmCustomerPasswordReset
      tags: [authentication]
      summary: Reset a password and revoke all customer sessions
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PasswordResetConfirmationInput' }
      responses:
        '204': { description: The password was reset and every session was revoked. }
        '400': { $ref: '#/components/responses/ApiError' }
        '429': { $ref: '#/components/responses/ApiError' }
  /api/v1/auth/session:
    get:
      operationId: getCustomerSession
      tags: [authentication]
      summary: Read the current customer session
      security: [{ tms_session: [] }]
      responses:
        '200':
          description: The current customer session.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthSessionResponse' }
        '401': { $ref: '#/components/responses/ApiError' }
  /api/v1/auth/sessions:
    delete:
      operationId: revokeAllCustomerSessions
      tags: [authentication]
      summary: Revoke every session owned by the current customer
      security: [{ tms_session: [] }]
      responses:
        '204': { description: Every customer session was revoked. }
        '401': { $ref: '#/components/responses/ApiError' }
  /api/v1/auth/sessions/{sessionId}:
    delete:
      operationId: revokeCustomerSession
      tags: [authentication]
      summary: Revoke one session owned by the current customer
      security: [{ tms_session: [] }]
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: The owned session was revoked. }
        '400': { $ref: '#/components/responses/ApiError' }
        '401': { $ref: '#/components/responses/ApiError' }
        '404': { $ref: '#/components/responses/ApiError' }
  /api/v1/admin/auth/login:
    post:
      operationId: loginAdministrator
      tags: [admin-authentication]
      summary: Authenticate an administrator or begin required MFA
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AdminLoginInput' }
      responses:
        '200':
          description: A session or MFA challenge was created.
          headers:
            Set-Cookie:
              schema: { type: string }
              description: Present only after authentication completes; HttpOnly, SameSite=Lax, Secure in production.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminLoginResponse' }
        '400': { $ref: '#/components/responses/ApiError' }
        '401': { $ref: '#/components/responses/ApiError' }
        '429': { $ref: '#/components/responses/ApiError' }
  /api/v1/admin/auth/mfa/enroll:
    post:
      operationId: beginAdministratorMfaEnrollment
      tags: [admin-authentication]
      summary: Generate a TOTP factor after password verification
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AdminMfaChallengeInput' }
      responses:
        '200':
          description: The TOTP secret is returned once for enrollment.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminTotpEnrollmentResponse' }
        '400': { $ref: '#/components/responses/ApiError' }
        '429': { $ref: '#/components/responses/ApiError' }
  /api/v1/admin/auth/mfa/enroll/confirm:
    post:
      operationId: confirmAdministratorMfaEnrollment
      tags: [admin-authentication]
      summary: Confirm TOTP enrollment and create an MFA-assured session
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AdminMfaCodeInput' }
      responses:
        '200':
          description: TOTP was enrolled and an administration session was created.
          headers:
            Set-Cookie:
              schema: { type: string }
              description: HttpOnly, SameSite=Lax administration session cookie; Secure in production.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminSessionResponse' }
        '400': { $ref: '#/components/responses/ApiError' }
        '401': { $ref: '#/components/responses/ApiError' }
        '429': { $ref: '#/components/responses/ApiError' }
  /api/v1/admin/auth/mfa/verify:
    post:
      operationId: verifyAdministratorMfa
      tags: [admin-authentication]
      summary: Complete a TOTP challenge and create an MFA-assured session
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AdminMfaCodeInput' }
      responses:
        '200':
          description: An administration session was created.
          headers:
            Set-Cookie:
              schema: { type: string }
              description: HttpOnly, SameSite=Lax administration session cookie; Secure in production.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminSessionResponse' }
        '400': { $ref: '#/components/responses/ApiError' }
        '401': { $ref: '#/components/responses/ApiError' }
        '429': { $ref: '#/components/responses/ApiError' }
  /api/v1/admin/auth/logout:
    post:
      operationId: logoutAdministrator
      tags: [admin-authentication]
      summary: Revoke the current administration session when present
      responses:
        '204': { description: The session was revoked when present. }
  /api/v1/admin/auth/session:
    get:
      operationId: getAdministratorSession
      tags: [admin-authentication]
      summary: Read the current administrator, roles, permissions, and assurance level
      security: [{ tms_admin_session: [] }]
      responses:
        '200':
          description: The current administration session.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminSessionResponse' }
        '401': { $ref: '#/components/responses/ApiError' }
  /api/v1/admin/auth/sessions/{sessionId}:
    delete:
      operationId: revokeAdministratorSession
      tags: [admin-authentication]
      summary: Revoke an owned administration session or another with system authority and MFA
      security: [{ tms_admin_session: [] }]
      parameters:
        - name: sessionId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: The administration session was revoked. }
        '400': { $ref: '#/components/responses/ApiError' }
        '401': { $ref: '#/components/responses/ApiError' }
        '403': { $ref: '#/components/responses/ApiError' }
        '404': { $ref: '#/components/responses/ApiError' }
  /api/v1/admin/access/roles:
    get:
      operationId: listAdministratorRoles
      tags: [admin-access]
      summary: List roles and their permission grants
      security: [{ tms_admin_session: [] }]
      responses:
        '200':
          description: The canonical administrative role matrix.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminRolesResponse' }
        '401': { $ref: '#/components/responses/ApiError' }
        '403': { $ref: '#/components/responses/ApiError' }
  /api/v1/admin/access/users/{userId}/roles/{roleCode}:
    parameters:
      - name: userId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: roleCode
        in: path
        required: true
        schema: { type: string, pattern: '^[A-Z][A-Z0-9_]{0,63}$' }
    put:
      operationId: assignAdministratorRole
      tags: [admin-access]
      summary: Assign a role with system.manage permission and MFA assurance
      security: [{ tms_admin_session: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AdminRoleAssignmentInput' }
      responses:
        '204': { description: The role assignment is active. }
        '400': { $ref: '#/components/responses/ApiError' }
        '401': { $ref: '#/components/responses/ApiError' }
        '403': { $ref: '#/components/responses/ApiError' }
        '404': { $ref: '#/components/responses/ApiError' }
    delete:
      operationId: revokeAdministratorRole
      tags: [admin-access]
      summary: Revoke a role with system.manage permission and MFA assurance
      security: [{ tms_admin_session: [] }]
      responses:
        '204': { description: The role assignment was removed. }
        '400': { $ref: '#/components/responses/ApiError' }
        '401': { $ref: '#/components/responses/ApiError' }
        '403': { $ref: '#/components/responses/ApiError' }
        '404': { $ref: '#/components/responses/ApiError' }
        '409': { $ref: '#/components/responses/ApiError' }
  /api/v1/artworks:
    get:
      operationId: listPublishedArtworks
      tags: [artworks]
      summary: List published artworks with their exact published versions
      parameters:
        - name: cursor
          in: query
          schema: { type: string, format: uuid }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        '200':
          description: A cursor page containing only published artworks.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ArtworkPageResponse' }
        '400': { $ref: '#/components/responses/ApiError' }
  /api/v1/artworks/{slug}:
    get:
      operationId: getPublishedArtwork
      tags: [artworks]
      summary: Get a published artwork by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string, maxLength: 160, pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$' }
      responses:
        '200':
          description: The artwork and its exact published version.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ArtworkResponse' }
        '400': { $ref: '#/components/responses/ApiError' }
        '404': { $ref: '#/components/responses/ApiError' }
  /api/v1/admin/artworks:
    get:
      operationId: listAdministratorArtworks
      tags: [administrator-artworks]
      summary: List artworks and complete immutable version histories
      security: [{ tms_admin_session: [] }]
      parameters:
        - name: cursor
          in: query
          schema: { type: string, format: uuid }
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/ArtworkStatus' }
      responses:
        '200':
          description: A permission-scoped cursor page of administrator artwork records.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminArtworkPageResponse' }
        '400': { $ref: '#/components/responses/ApiError' }
        '401': { $ref: '#/components/responses/ApiError' }
        '403': { $ref: '#/components/responses/ApiError' }
    post:
      operationId: createAdministratorArtwork
      tags: [administrator-artworks]
      summary: Create an artwork root and its first immutable draft version
      security: [{ tms_admin_session: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ArtworkCreateInput' }
      responses:
        '201':
          description: The draft artwork and first version were created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminArtworkResponse' }
        '400': { $ref: '#/components/responses/ApiError' }
        '401': { $ref: '#/components/responses/ApiError' }
        '403': { $ref: '#/components/responses/ApiError' }
        '409': { $ref: '#/components/responses/ApiError' }
  /api/v1/admin/artworks/{artworkId}:
    get:
      operationId: getAdministratorArtwork
      tags: [administrator-artworks]
      summary: Get an artwork and its immutable version history
      security: [{ tms_admin_session: [] }]
      parameters:
        - $ref: '#/components/parameters/ArtworkId'
      responses:
        '200':
          description: The administrator artwork record.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminArtworkResponse' }
        '400': { $ref: '#/components/responses/ApiError' }
        '401': { $ref: '#/components/responses/ApiError' }
        '403': { $ref: '#/components/responses/ApiError' }
        '404': { $ref: '#/components/responses/ApiError' }
  /api/v1/admin/artworks/{artworkId}/versions:
    post:
      operationId: createAdministratorArtworkVersion
      tags: [administrator-artworks]
      summary: Create the next immutable draft version
      security: [{ tms_admin_session: [] }]
      parameters:
        - $ref: '#/components/parameters/ArtworkId'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ArtworkVersionInput' }
      responses:
        '201':
          description: The next immutable draft version was created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminArtworkResponse' }
        '400': { $ref: '#/components/responses/ApiError' }
        '401': { $ref: '#/components/responses/ApiError' }
        '403': { $ref: '#/components/responses/ApiError' }
        '404': { $ref: '#/components/responses/ApiError' }
        '409': { $ref: '#/components/responses/ApiError' }
  /api/v1/admin/artworks/{artworkId}/versions/{versionId}/publish:
    post:
      operationId: publishAdministratorArtworkVersion
      tags: [administrator-artworks]
      summary: Publish an exact version and archive the previous publication
      security: [{ tms_admin_session: [] }]
      parameters:
        - $ref: '#/components/parameters/ArtworkId'
        - $ref: '#/components/parameters/ArtworkVersionId'
      responses:
        '200':
          description: The selected immutable version is published.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminArtworkResponse' }
        '400': { $ref: '#/components/responses/ApiError' }
        '401': { $ref: '#/components/responses/ApiError' }
        '403': { $ref: '#/components/responses/ApiError' }
        '404': { $ref: '#/components/responses/ApiError' }
  /api/v1/admin/artworks/{artworkId}/versions/{versionId}/archive:
    post:
      operationId: archiveAdministratorArtworkVersion
      tags: [administrator-artworks]
      summary: Archive an exact version without deleting its content
      security: [{ tms_admin_session: [] }]
      parameters:
        - $ref: '#/components/parameters/ArtworkId'
        - $ref: '#/components/parameters/ArtworkVersionId'
      responses:
        '200':
          description: The selected immutable version is archived.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminArtworkResponse' }
        '400': { $ref: '#/components/responses/ApiError' }
        '401': { $ref: '#/components/responses/ApiError' }
        '403': { $ref: '#/components/responses/ApiError' }
        '404': { $ref: '#/components/responses/ApiError' }
  /api/v1/admin/artworks/{artworkId}/archive:
    post:
      operationId: archiveAdministratorArtwork
      tags: [administrator-artworks]
      summary: Archive an artwork and its currently published version
      security: [{ tms_admin_session: [] }]
      parameters:
        - $ref: '#/components/parameters/ArtworkId'
      responses:
        '200':
          description: The artwork is archived and hidden from public reads.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminArtworkResponse' }
        '400': { $ref: '#/components/responses/ApiError' }
        '401': { $ref: '#/components/responses/ApiError' }
        '403': { $ref: '#/components/responses/ApiError' }
        '404': { $ref: '#/components/responses/ApiError' }
  /api/v1/health/liveness:
    get:
      operationId: getLiveness
      tags: [health]
      summary: Confirm that the API process is alive
      responses:
        '200':
          description: The API process is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/health/live:
    get:
      operationId: getLive
      tags: [health]
      summary: Short alias for the API liveness check
      responses:
        '200':
          description: The API process is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/health/readiness:
    get:
      operationId: getReadiness
      tags: [health]
      summary: Confirm that the API is ready to accept traffic
      responses:
        '200':
          description: The API process is ready. Dependency probes are added in B1.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/health/ready:
    get:
      operationId: getReady
      tags: [health]
      summary: Short alias for the API readiness check
      responses:
        '200':
          description: The API process is ready. Dependency probes are added in B1.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
components:
  parameters:
    ArtworkId:
      name: artworkId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ArtworkVersionId:
      name: versionId
      in: path
      required: true
      schema: { type: string, format: uuid }
  securitySchemes:
    tms_session:
      type: apiKey
      in: cookie
      name: tms_session
    tms_admin_session:
      type: apiKey
      in: cookie
      name: tms_admin_session
  responses:
    ApiError:
      description: The request could not be completed.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
  schemas:
    CustomerRegistrationInput:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email: { type: string, format: email, maxLength: 320 }
        password: { type: string, format: password, minLength: 12, maxLength: 128 }
        displayName: { type: string, minLength: 1, maxLength: 100 }
    CustomerLoginInput:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email: { type: string, format: email, maxLength: 320 }
        password: { type: string, format: password, minLength: 1, maxLength: 128 }
    AuthEmailInput:
      type: object
      additionalProperties: false
      required: [email]
      properties:
        email: { type: string, format: email, maxLength: 320 }
    AuthTokenInput:
      type: object
      additionalProperties: false
      required: [token]
      properties:
        token: { type: string, minLength: 43, maxLength: 43, pattern: '^[A-Za-z0-9_-]{43}$' }
    PasswordResetConfirmationInput:
      type: object
      additionalProperties: false
      required: [token, password]
      properties:
        token: { type: string, minLength: 43, maxLength: 43, pattern: '^[A-Za-z0-9_-]{43}$' }
        password: { type: string, format: password, minLength: 12, maxLength: 128 }
    AuthUser:
      type: object
      required: [id, email, status, emailVerifiedAt, displayName]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        status: { type: string, enum: [PENDING_VERIFICATION, ACTIVE] }
        emailVerifiedAt: { type: [string, 'null'], format: date-time }
        displayName: { type: [string, 'null'] }
    AuthSession:
      type: object
      required: [id, expiresAt, user]
      properties:
        id: { type: string, format: uuid }
        expiresAt: { type: string, format: date-time }
        user: { $ref: '#/components/schemas/AuthUser' }
    AuthSessionResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [session]
          properties:
            session: { $ref: '#/components/schemas/AuthSession' }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    AuthRegistrationResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [user, verificationRequired]
          properties:
            user: { $ref: '#/components/schemas/AuthUser' }
            verificationRequired: { type: boolean, const: true }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    AuthAcceptedResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [accepted]
          properties:
            accepted: { type: boolean, const: true }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    AdminLoginInput:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email: { type: string, format: email, maxLength: 320 }
        password: { type: string, format: password, minLength: 1, maxLength: 128 }
    AdminMfaChallengeInput:
      type: object
      additionalProperties: false
      required: [challengeToken]
      properties:
        challengeToken:
          { type: string, minLength: 43, maxLength: 43, pattern: '^[A-Za-z0-9_-]{43}$' }
    AdminMfaCodeInput:
      type: object
      additionalProperties: false
      required: [challengeToken, code]
      properties:
        challengeToken:
          { type: string, minLength: 43, maxLength: 43, pattern: '^[A-Za-z0-9_-]{43}$' }
        code: { type: string, pattern: '^\d{6}$' }
