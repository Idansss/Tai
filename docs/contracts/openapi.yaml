  /api/v1/cart:
    get:
      operationId: getCart
      tags: [cart]
      summary: Read the current cart with fresh totals
      description: >
        Open to anonymous shoppers. A guest cart cookie (tms_cart) is issued on first contact.
        When a signed-in customer still carries a guest cookie, the guest cart is merged into
        theirs once and the cookie is cleared. Prices and availability are recomputed on every
        read, so a cart can never quote a stale price.
      responses:
        '200': { $ref: '#/components/responses/Cart' }
  /api/v1/cart/items:
    post:
      operationId: addCartItem
      tags: [cart]
      summary: Add an approved configuration
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddCartLineInput' }
      responses:
        '200': { $ref: '#/components/responses/Cart' }
        '400': { $ref: '#/components/responses/ApiError' }
        '409': { $ref: '#/components/responses/ApiError' }
        '422': { $ref: '#/components/responses/ApiError' }
