  /api/v1/checkout/delivery-options:
    get:
      operationId: getDeliveryOptions
      tags: [checkout]
      summary: List server-authoritative delivery methods and fees for a destination
      description: >
        Server-authoritative delivery methods and fees. Lagos is a cheaper zone; every other
        state is nationwide. A shipping provider with live rates replaces this in TMS-B5-003.
      parameters:
        - name: state
          in: query
          required: false
          schema: { type: string, maxLength: 100 }
      responses:
        '200': { $ref: '#/components/responses/DeliveryOptionList' }
  /api/v1/checkout/quote:
    post:
      operationId: createCheckoutQuote
      tags: [checkout]
      summary: Quote the authoritative delivery, tax, and total for the current cart
      description: >
        A display quote for the current cart, an address, and a delivery method. The promotion is
        taken from the cart itself (applied via the cart endpoints). Placing the order recomputes
        everything authoritatively, so the quote is never trusted on its own. Tax is Nigerian VAT
        on the discounted goods subtotal; delivery is added after tax.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CheckoutQuoteInput' }
      responses:
        '200': { $ref: '#/components/responses/CheckoutQuote' }
        '400': { $ref: '#/components/responses/ApiError' }
        '409': { $ref: '#/components/responses/ApiError' }
  /api/v1/orders:
    post:
      operationId: placeOrder
      tags: [orders]
      summary: Place an order from the current cart (guest or signed-in)
      description: >
        Refuses an empty cart or any cart with an unavailable line before anything else, takes a
        short inventory hold per line, snapshots every line with copied prices and descriptions
        (ADR-015), writes the immutable order, and empties the cart. The order begins
        AWAITING_PAYMENT; payment is taken in TMS-B5-001. An optional Idempotency-Key header makes
        a retried submission return the same order rather than placing a second one.
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema: { type: string, minLength: 8, maxLength: 120 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PlaceOrderInput' }
      responses:
        '201': { $ref: '#/components/responses/Order' }
        '400': { $ref: '#/components/responses/ApiError' }
        '409': { $ref: '#/components/responses/ApiError' }
    get:
      operationId: listCustomerOrders
      tags: [orders]
      summary: List your order history
      security: [{ tms_session: [] }]
      responses:
        '200': { $ref: '#/components/responses/OrderList' }
        '401': { $ref: '#/components/responses/ApiError' }
