      properties:
        slug: { type: string, minLength: 1, maxLength: 160, pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$' }
        title: { type: string, minLength: 1, maxLength: 200 }
        shortStory: { type: [string, 'null'], maxLength: 500 }
        story: { type: [string, 'null'], maxLength: 10000 }
        inspiration: { type: [string, 'null'], maxLength: 5000 }
        metadata:
          type: object
          additionalProperties: true
