            items: { type: array, items: { $ref: '#/components/schemas/Drop' } }
            nextCursor: { type: [string, 'null'], format: uuid }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    EditionResponse:
      type: object
      required: [data, meta]
      properties:
        data: { $ref: '#/components/schemas/Edition' }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    EditionListResponse:
      type: object
      required: [data, meta]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Edition' } }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    StoryResponse:
      type: object
      required: [data, meta]
      properties:
        data: { $ref: '#/components/schemas/Story' }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    StoryListResponse:
      type: object
      required: [data, meta]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/Story' } }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    StoryPageResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [items, nextCursor]
          properties:
            items: { type: array, items: { $ref: '#/components/schemas/Story' } }
            nextCursor: { type: [string, 'null'], format: uuid }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    AssociationResponse:
      type: object
      required: [data, meta]
      properties:
        data: { type: object, additionalProperties: true }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    ArtworkStatus:
      type: string
      enum: [DRAFT, PUBLISHED, ARCHIVED]
    ArtworkVersionInput:
      type: object
      additionalProperties: false
      required: [title]
      properties:
        title: { type: string, minLength: 1, maxLength: 200 }
        shortStory: { type: [string, 'null'], maxLength: 500 }
        story: { type: [string, 'null'], maxLength: 10000 }
        inspiration: { type: [string, 'null'], maxLength: 5000 }
        metadata:
          type: object
          additionalProperties: true
    ArtworkCreateInput:
      type: object
      additionalProperties: false
      required: [slug, title]
      properties:
        slug: { type: string, minLength: 1, maxLength: 160, pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$' }
        title: { type: string, minLength: 1, maxLength: 200 }
        shortStory: { type: [string, 'null'], maxLength: 500 }
        story: { type: [string, 'null'], maxLength: 10000 }
        inspiration: { type: [string, 'null'], maxLength: 5000 }
        metadata:
          type: object
          additionalProperties: true
    ArtworkVersion:
      type: object
      required:
        [
          id,
          versionNumber,
          status,
          title,
          shortStory,
          story,
          inspiration,
          metadata,
          publishedAt,
          archivedAt,
          createdAt,
        ]
      properties:
        id: { type: string, format: uuid }
        versionNumber: { type: integer, minimum: 1 }
        status: { $ref: '#/components/schemas/ArtworkStatus' }
        title: { type: string }
        shortStory: { type: [string, 'null'] }
        story: { type: [string, 'null'] }
        inspiration: { type: [string, 'null'] }
        metadata:
          type: object
          additionalProperties: true
        publishedAt: { type: [string, 'null'], format: date-time }
        archivedAt: { type: [string, 'null'], format: date-time }
        createdAt: { type: string, format: date-time }
    Artwork:
      type: object
      required: [id, slug, status, publishedVersion, createdAt, updatedAt, publishedAt, archivedAt]
      properties:
        id: { type: string, format: uuid }
        slug: { type: string, maxLength: 160, pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$' }
        status: { $ref: '#/components/schemas/ArtworkStatus' }
        publishedVersion:
          oneOf:
            - $ref: '#/components/schemas/ArtworkVersion'
            - type: 'null'
        startingPrice:
          description: >
            The lowest approved price across every garment this artwork's published version is
            approved on, resolved server-side (ADR-015). Null when no approved priced pair exists
            yet. Present on public reads (TMS-FBR-011).
          oneOf:
            - $ref: '#/components/schemas/Money'
            - type: 'null'
        availability:
          description: >
            Catalogue-level availability derived from drop windows only, never from stock
            (TMS-FBR-012). AVAILABLE means the catalogue permits this sale now. Present on public
            reads.
          type: string
          enum: [AVAILABLE, DROP_NOT_OPEN, DROP_ENDED]
        tags:
          type: array
          items: { $ref: '#/components/schemas/Tag' }
        collections:
          type: array
          items: { $ref: '#/components/schemas/CatalogueEntry' }
        drops:
          type: array
          items: { $ref: '#/components/schemas/Drop' }
        editions:
          type: array
          items: { $ref: '#/components/schemas/Edition' }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        publishedAt: { type: [string, 'null'], format: date-time }
        archivedAt: { type: [string, 'null'], format: date-time }
    AdminArtwork:
      allOf:
        - $ref: '#/components/schemas/Artwork'
        - type: object
          required: [versions]
          properties:
            versions:
              type: array
              items: { $ref: '#/components/schemas/ArtworkVersion' }
    ArtworkResponse:
      type: object
      required: [data, meta]
      properties:
        data: { $ref: '#/components/schemas/Artwork' }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    AdminArtworkResponse:
      type: object
      required: [data, meta]
      properties:
        data: { $ref: '#/components/schemas/AdminArtwork' }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    ArtworkPageResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [items, nextCursor]
          properties:
            items:
              type: array
              items: { $ref: '#/components/schemas/Artwork' }
            nextCursor: { type: [string, 'null'], format: uuid }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    AdminArtworkPageResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [items, nextCursor]
          properties:
            items:
              type: array
              items: { $ref: '#/components/schemas/AdminArtwork' }
            nextCursor: { type: [string, 'null'], format: uuid }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    GarmentType:
      type: string
      enum:
        [
          CLASSIC_TSHIRT,
          OVERSIZED_TSHIRT,
          LONG_SLEEVE,
          HOODIE,
          SWEATSHIRT,
          TOTE_BAG,
          CAP,
          ART_PRINT,
        ]
    GarmentView:
      type: string
      enum: [FRONT, BACK, LEFT, RIGHT]
    CompatibilityStatus:
      type: string
      enum: [DRAFT, APPROVED, ARCHIVED]
    GarmentTemplateInput:
      type: object
      additionalProperties: false
      required: [slug, title, type]
      properties:
        slug: { type: string, maxLength: 160, pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$' }
        title: { type: string, minLength: 1, maxLength: 200 }
        description: { type: [string, 'null'], maxLength: 10000 }
        type: { $ref: '#/components/schemas/GarmentType' }
        fabric: { type: [string, 'null'], maxLength: 500 }
        fit: { type: [string, 'null'], maxLength: 500 }
        care: { type: [string, 'null'], maxLength: 10000 }
    GarmentTemplateUpdateInput:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        slug: { type: string, maxLength: 160, pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$' }
        title: { type: string, minLength: 1, maxLength: 200 }
        description: { type: [string, 'null'], maxLength: 10000 }
        type: { $ref: '#/components/schemas/GarmentType' }
        fabric: { type: [string, 'null'], maxLength: 500 }
        fit: { type: [string, 'null'], maxLength: 500 }
        care: { type: [string, 'null'], maxLength: 10000 }
        status: { $ref: '#/components/schemas/ArtworkStatus' }
    GarmentColourInput:
      type: object
      additionalProperties: false
      required: [slug, name, hex]
      properties:
        slug: { type: string, maxLength: 100, pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$' }
        name: { type: string, minLength: 1, maxLength: 100 }
        hex: { type: string, pattern: '^#[0-9A-Fa-f]{6}$' }
        position: { type: integer, minimum: 0, default: 0 }
        status: { $ref: '#/components/schemas/ArtworkStatus' }
    GarmentMeasurementInput:
      type: object
      additionalProperties: false
      required: [key, label, valueMm]
      properties:
        key: { type: string, maxLength: 64, pattern: '^[a-z][a-z0-9_]*$' }
        label: { type: string, minLength: 1, maxLength: 100 }
        valueMm: { type: integer, minimum: 1 }
    GarmentSizeInput:
      type: object
      additionalProperties: false
      required: [code, label]
      properties:
        code: { type: string, minLength: 1, maxLength: 32 }
        label: { type: string, minLength: 1, maxLength: 100 }
        position: { type: integer, minimum: 0, default: 0 }
        status: { $ref: '#/components/schemas/ArtworkStatus' }
        measurements:
          type: array
          maxItems: 50
          default: []
          items: { $ref: '#/components/schemas/GarmentMeasurementInput' }
    GarmentVariantInput:
      type: object
      additionalProperties: false
      required: [colourId, sizeId, sku]
      properties:
        colourId: { type: string, format: uuid }
        sizeId: { type: string, format: uuid }
        sku: { type: string, minLength: 1, maxLength: 80 }
        status: { $ref: '#/components/schemas/ArtworkStatus' }
    GarmentPlacementInput:
      type: object
      additionalProperties: false
      required:
        [
          slug,
          name,
          view,
          xPermille,
          yPermille,
          widthPermille,
          heightPermille,
          printWidthMm,
          printHeightMm,
        ]
      properties:
        slug: { type: string, maxLength: 100, pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$' }
        name: { type: string, minLength: 1, maxLength: 100 }
        view: { $ref: '#/components/schemas/GarmentView' }
        xPermille: { type: integer, minimum: 0, maximum: 999 }
        yPermille: { type: integer, minimum: 0, maximum: 999 }
        widthPermille: { type: integer, minimum: 1, maximum: 1000 }
        heightPermille: { type: integer, minimum: 1, maximum: 1000 }
        printWidthMm: { type: integer, minimum: 1 }
        printHeightMm: { type: integer, minimum: 1 }
        position: { type: integer, minimum: 0, default: 0 }
        status: { $ref: '#/components/schemas/ArtworkStatus' }
    GarmentScalePresetInput:
      type: object
      additionalProperties: false
      required: [slug, name, scalePercent]
      properties:
        slug: { type: string, maxLength: 64, pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$' }
        name: { type: string, minLength: 1, maxLength: 100 }
        scalePercent: { type: integer, minimum: 1, maximum: 100 }
        position: { type: integer, minimum: 0, default: 0 }
        status: { $ref: '#/components/schemas/ArtworkStatus' }
    ArtworkGarmentCompatibilityInput:
      type: object
      additionalProperties: false
      required: [status]
      description: >
        unitPriceMinor and currency are required exactly when status is APPROVED and rejected
        otherwise, so a configuration can never be sold at a price nobody approved. See ADR-015.
      properties:
        status: { $ref: '#/components/schemas/CompatibilityStatus' }
        placementIds:
          type: array
          maxItems: 50
          default: []
          uniqueItems: true
          items: { type: string, format: uuid }
        unitPriceMinor: { $ref: '#/components/schemas/MoneyMinor' }
        currency: { $ref: '#/components/schemas/Currency' }
    MoneyMinor:
      type: integer
      minimum: 1
      maximum: 100000000
      description: An amount in integer minor units, such as kobo. Money is never a float.
    Currency:
      type: string
      pattern: '^[A-Z]{3}$'
      example: NGN
    Money:
      type: object
      required: [amountMinor, currency]
      properties:
        amountMinor: { $ref: '#/components/schemas/MoneyMinor' }
        currency: { $ref: '#/components/schemas/Currency' }
    ConfigurationAvailability:
      type: object
      required: [state, opensAt, closesAt]
      description: >
        Catalogue-level availability only. Stock is TMS-B4-001 and will refine this, so AVAILABLE
        means the catalogue permits this sale, never that a unit is reserved.
      properties:
        state:
          type: string
          enum: [AVAILABLE, DROP_NOT_OPEN, DROP_ENDED, EDITION_EXHAUSTED]
        opensAt: { type: string, format: date-time, nullable: true }
        closesAt: { type: string, format: date-time, nullable: true }
    DesignConfigurationInput:
      type: object
      additionalProperties: false
      required: [artworkVersionId, garmentVariantId, placementId, scalePreset, view]
      properties:
        artworkVersionId: { type: string, format: uuid }
        garmentVariantId: { type: string, format: uuid }
        placementId: { type: string, format: uuid }
        scalePreset:
          { type: string, minLength: 1, maxLength: 64, pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$' }
        view: { $ref: '#/components/schemas/GarmentView' }
        quantity: { type: integer, minimum: 1, maximum: 100, default: 1 }
    GarmentMeasurement:
      allOf:
        - $ref: '#/components/schemas/GarmentMeasurementInput'
        - type: object
          required: [id]
          properties:
            id: { type: string, format: uuid }
    GarmentColour:
      allOf:
        - $ref: '#/components/schemas/GarmentColourInput'
        - type: object
          required: [id, templateId, status]
          properties:
            id: { type: string, format: uuid }
            templateId: { type: string, format: uuid }
            status: { $ref: '#/components/schemas/ArtworkStatus' }
    GarmentSize:
      allOf:
        - $ref: '#/components/schemas/GarmentSizeInput'
        - type: object
          required: [id, templateId, status, measurements]
          properties:
            id: { type: string, format: uuid }
            templateId: { type: string, format: uuid }
            status: { $ref: '#/components/schemas/ArtworkStatus' }
            measurements:
              type: array
              items: { $ref: '#/components/schemas/GarmentMeasurement' }
    GarmentVariant:
      allOf:
        - $ref: '#/components/schemas/GarmentVariantInput'
        - type: object
          required: [id, templateId, status]
          properties:
            id: { type: string, format: uuid }
            templateId: { type: string, format: uuid }
            status: { $ref: '#/components/schemas/ArtworkStatus' }
    GarmentScalePreset:
      allOf:
        - $ref: '#/components/schemas/GarmentScalePresetInput'
        - type: object
          required: [id, placementId, status]
          properties:
            id: { type: string, format: uuid }
            placementId: { type: string, format: uuid }
            status: { $ref: '#/components/schemas/ArtworkStatus' }
    GarmentPlacement:
      allOf:
        - $ref: '#/components/schemas/GarmentPlacementInput'
        - type: object
          required: [id, templateId, status, scalePresets]
          properties:
            id: { type: string, format: uuid }
            templateId: { type: string, format: uuid }
            status: { $ref: '#/components/schemas/ArtworkStatus' }
            scalePresets:
              type: array
              items: { $ref: '#/components/schemas/GarmentScalePreset' }
    GarmentTemplate:
      allOf:
        - $ref: '#/components/schemas/GarmentTemplateInput'
        - type: object
          required:
            [
              id,
              status,
              colours,
              sizes,
              variants,
              placements,
              publishedAt,
              archivedAt,
              createdAt,
              updatedAt,
            ]
          properties:
            id: { type: string, format: uuid }
            status: { $ref: '#/components/schemas/ArtworkStatus' }
            colours:
              type: array
              items: { $ref: '#/components/schemas/GarmentColour' }
            sizes:
              type: array
              items: { $ref: '#/components/schemas/GarmentSize' }
            variants:
              type: array
              items: { $ref: '#/components/schemas/GarmentVariant' }
            placements:
              type: array
              items: { $ref: '#/components/schemas/GarmentPlacement' }
            publishedAt: { type: [string, 'null'], format: date-time }
            archivedAt: { type: [string, 'null'], format: date-time }
            createdAt: { type: string, format: date-time }
            updatedAt: { type: string, format: date-time }
    GarmentResponse:
      type: object
      required: [data, meta]
      properties:
        data: { $ref: '#/components/schemas/GarmentTemplate' }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    GarmentListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/GarmentTemplate' }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    GarmentPageResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [items, nextCursor]
          properties:
            items:
              type: array
              items: { $ref: '#/components/schemas/GarmentTemplate' }
            nextCursor: { type: [string, 'null'], format: uuid }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    GarmentMemberResponse:
      type: object
      required: [data, meta]
      properties:
        data: { type: object, additionalProperties: true }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    ArtworkGarmentCompatibility:
      type: object
      required: [id, artworkVersionId, templateId, status, placements, template]
      properties:
        id: { type: string, format: uuid }
        artworkVersionId: { type: string, format: uuid }
        templateId: { type: string, format: uuid }
        status: { $ref: '#/components/schemas/CompatibilityStatus' }
        unitPriceMinor:
          allOf: [{ $ref: '#/components/schemas/MoneyMinor' }]
          nullable: true
          description: Non-null exactly when status is APPROVED.
        currency:
          allOf: [{ $ref: '#/components/schemas/Currency' }]
          nullable: true
        placements:
          type: array
          items:
            type: object
            required: [placement]
            properties:
              placement: { $ref: '#/components/schemas/GarmentPlacement' }
        template: { $ref: '#/components/schemas/GarmentTemplate' }
    ArtworkGarmentCompatibilityListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/ArtworkGarmentCompatibility' }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    GarmentConfigurationValidation:
      type: object
      required:
        [
          valid,
          artworkId,
          artworkVersionId,
          garmentTemplateId,
          garmentVariantId,
          placementId,
          scalePresetId,
          view,
          quantity,
          unitPrice,
          totalPrice,
          availability,
        ]
      properties:
        valid: { type: boolean, const: true }
        artworkId: { type: string, format: uuid }
        artworkVersionId: { type: string, format: uuid }
        garmentTemplateId: { type: string, format: uuid }
        garmentVariantId: { type: string, format: uuid }
        placementId: { type: string, format: uuid }
        scalePresetId: { type: string, format: uuid }
        unitPrice: { $ref: '#/components/schemas/Money' }
        totalPrice: { $ref: '#/components/schemas/Money' }
        availability: { $ref: '#/components/schemas/ConfigurationAvailability' }
        view: { $ref: '#/components/schemas/GarmentView' }
        quantity: { type: integer, minimum: 1, maximum: 100 }
    GarmentConfigurationValidationResponse:
      type: object
      required: [data, meta]
      properties:
        data: { $ref: '#/components/schemas/GarmentConfigurationValidation' }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    SaveDesignInput:
      type: object
      required: [artworkVersionId, garmentVariantId, placementId, scalePreset, view]
      description: >
        The approved tuple only. Quantity is deliberately absent because it is a cart concern,
        not part of a design's identity. Freeform print geometry and crop are never accepted;
        see ADR-013.
      properties:
        artworkVersionId: { type: string, format: uuid }
        garmentVariantId: { type: string, format: uuid }
        placementId: { type: string, format: uuid }
        scalePreset: { type: string, maxLength: 64, pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$' }
        view: { type: string, enum: [FRONT, BACK] }
        name: { type: string, minLength: 1, maxLength: 120 }
      additionalProperties: false
    UpdateDesignInput:
      type: object
      minProperties: 1
      properties:
        name: { type: string, minLength: 1, maxLength: 120, nullable: true }
        visibility: { type: string, enum: [PRIVATE, UNLISTED] }
      additionalProperties: false
    DesignConfiguration:
      type: object
      required:
        [
          id,
          artworkId,
          artworkVersionId,
          garmentTemplateId,
          garmentVariantId,
          placementId,
          scalePresetId,
          view,
          configurationHash,
          name,
          visibility,
          shareToken,
          createdAt,
          updatedAt,
        ]
      properties:
        id: { type: string, format: uuid }
        artworkId: { type: string, format: uuid }
        artworkVersionId: { type: string, format: uuid }
        garmentTemplateId: { type: string, format: uuid }
        garmentVariantId: { type: string, format: uuid }
        placementId: { type: string, format: uuid }
        scalePresetId: { type: string, format: uuid }
        view: { type: string, enum: [FRONT, BACK] }
        configurationHash:
          type: string
          pattern: '^[0-9a-f]{64}$'
          description: Deterministic SHA-256 of the approved tuple; identical designs share one hash.
        name: { type: string, nullable: true, maxLength: 120 }
        visibility: { type: string, enum: [PRIVATE, UNLISTED] }
        shareToken:
          type: string
          nullable: true
          description: Present only while the design is UNLISTED and its owner is reading it. A shared read never returns it.
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    DesignResponse:
      type: object
      required: [data, meta]
      properties:
        data: { $ref: '#/components/schemas/DesignConfiguration' }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    DesignListResponse:
    AddCartLineInput:
      type: object
      additionalProperties: false
      required: [artworkVersionId, garmentVariantId, placementId, scalePreset, view]
      description: >
        The approved tuple and a quantity. A price is deliberately absent: it is resolved from
        the approved pair on the server and a browser-supplied amount is never accepted.
      properties:
        artworkVersionId: { type: string, format: uuid }
        garmentVariantId: { type: string, format: uuid }
        placementId: { type: string, format: uuid }
        scalePreset: { type: string, maxLength: 64, pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$' }
        view: { type: string, enum: [FRONT, BACK] }
        quantity: { type: integer, minimum: 1, maximum: 20, default: 1 }
    UpdateCartLineInput:
      type: object
      additionalProperties: false
      required: [quantity]
      properties:
        quantity: { type: integer, minimum: 1, maximum: 20 }
    PromotionCodeInput:
      type: object
      additionalProperties: false
      required: [code]
      properties:
        code: { type: string, pattern: '^[A-Z0-9][A-Z0-9_-]{2,63}$', example: WELCOME10 }
    CartLineIssue:
      type: string
      description: >
        Why a line cannot be bought right now, resolved fresh on every read. Checkout must
        refuse while any line has an issue.
      enum:
        [CONFIGURATION_NOT_APPROVED, OUT_OF_STOCK, INSUFFICIENT_STOCK, DROP_NOT_OPEN, DROP_ENDED]
    CartLine:
      type: object
      required:
        [
          lineId,
          artworkId,
          artworkVersionId,
          garmentTemplateId,
          garmentVariantId,
          placementId,
          scalePresetId,
          view,
          quantity,
          unitPrice,
          lineTotal,
          availableQuantity,
          issue,
        ]
      properties:
        lineId: { type: string, format: uuid }
        artworkId: { type: string, format: uuid }
        artworkVersionId: { type: string, format: uuid }
        garmentTemplateId: { type: string, format: uuid }
        garmentVariantId: { type: string, format: uuid }
        placementId: { type: string, format: uuid }
        scalePresetId: { type: string, format: uuid }
        view: { type: string, enum: [FRONT, BACK] }
        quantity: { type: integer, minimum: 1, maximum: 20 }
        unitPrice:
          allOf: [{ $ref: '#/components/schemas/Money' }]
          nullable: true
          description: Null when the configuration is no longer approved.
        lineTotal:
          allOf: [{ $ref: '#/components/schemas/Money' }]
          nullable: true
        availableQuantity:
          type: integer
          minimum: 0
          description: Units currently sellable. Stock is only held at checkout, never by the cart.
        issue:
          allOf: [{ $ref: '#/components/schemas/CartLineIssue' }]
          nullable: true
    AppliedPromotion:
      type: object
      required: [code, label, discount]
      properties:
        code: { type: string }
        label: { type: string }
        discount: { $ref: '#/components/schemas/Money' }
    CartData:
      type: object
      required: [id, currency, items, subtotal, promotion, total, hasIssues]
      description: >
        Delivery and tax are deliberately absent; they belong to the checkout quote. The
        subtotal counts only lines without an issue, and the total never falls below zero.
      properties:
        id: { type: string, format: uuid }
        currency: { $ref: '#/components/schemas/Currency' }
        items:
          type: array
          items: { $ref: '#/components/schemas/CartLine' }
        subtotal: { $ref: '#/components/schemas/Money' }
        promotion:
          allOf: [{ $ref: '#/components/schemas/AppliedPromotion' }]
          nullable: true
        total: { $ref: '#/components/schemas/Money' }
        hasIssues: { type: boolean }
    CartResponse:
      type: object
      required: [data, meta]
      properties:
        data: { $ref: '#/components/schemas/CartData' }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    OrderStatus:
      type: string
      enum:
        [
          DRAFT,
          AWAITING_PAYMENT,
          PAYMENT_PROCESSING,
          PAID,
          PRODUCTION_QUEUED,
          PRINTING,
          QUALITY_CHECK,
          READY_FOR_DISPATCH,
          SHIPMENT_BOOKED,
          SHIPPED,
          DELIVERED,
          COMPLETED,
          PAYMENT_FAILED,
          PAYMENT_CANCELLED,
          CANCEL_REQUESTED,
          CANCELLED,
          REFUND_PENDING,
          PARTIALLY_REFUNDED,
          REFUNDED,
          DELIVERY_EXCEPTION,
          RETURN_REQUESTED,
          RETURN_APPROVED,
          RETURN_IN_TRANSIT,
          RETURNED,
        ]
    PaymentStatus:
      type: string
      enum:
        [
          CREATED,
          PENDING,
          PROCESSING,
          SUCCEEDED,
          FAILED,
          CANCELLED,
          REVERSED,
          PARTIALLY_REFUNDED,
          REFUNDED,
          DISPUTED,
        ]
    DeliveryMethodId:
      type: string
      enum: [STANDARD, EXPRESS]
    CheckoutAddressInput:
      type: object
      additionalProperties: false
      required: [state, city, line1]
      properties:
        state: { type: string, minLength: 1, maxLength: 100 }
        city: { type: string, minLength: 1, maxLength: 120 }
        line1: { type: string, minLength: 1, maxLength: 200 }
        line2: { type: string, minLength: 1, maxLength: 200, nullable: true }
        postcode: { type: string, minLength: 1, maxLength: 20, nullable: true }
    CheckoutContactInput:
      type: object
      additionalProperties: false
      required: [email, name]
      properties:
        email: { type: string, format: email, maxLength: 320 }
        name: { type: string, minLength: 1, maxLength: 200 }
        phone: { type: string, pattern: '^\+?[0-9][0-9 ()-]{6,19}$', nullable: true }
    CheckoutQuoteInput:
      type: object
      additionalProperties: false
      required: [address, deliveryMethodId]
      properties:
        address: { $ref: '#/components/schemas/CheckoutAddressInput' }
        deliveryMethodId: { $ref: '#/components/schemas/DeliveryMethodId' }
    PlaceOrderInput:
      type: object
      additionalProperties: false
      required: [address, deliveryMethodId, contact]
      properties:
        address: { $ref: '#/components/schemas/CheckoutAddressInput' }
        deliveryMethodId: { $ref: '#/components/schemas/DeliveryMethodId' }
        contact: { $ref: '#/components/schemas/CheckoutContactInput' }
    DeliveryEtaDays:
      type: object
      required: [min, max]
      properties:
        min: { type: integer, minimum: 0 }
        max: { type: integer, minimum: 0 }
    DeliveryMethod:
      type: object
      required: [id, label, description, etaDays]
      properties:
        id: { $ref: '#/components/schemas/DeliveryMethodId' }
        label: { type: string }
        description: { type: string }
        etaDays: { $ref: '#/components/schemas/DeliveryEtaDays' }
    DeliveryOption:
      allOf:
        - { $ref: '#/components/schemas/DeliveryMethod' }
        - type: object
          required: [price]
          properties:
            price: { $ref: '#/components/schemas/Money' }
    DeliveryOptionListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/DeliveryOption' }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    CheckoutQuoteData:
      type: object
      required: [currency, subtotal, discount, delivery, tax, total, deliveryMethod, promotion]
      description: >
        Every amount is integer minor units and totals are integer arithmetic. Tax is Nigerian VAT
        on the discounted goods subtotal; the total is subtotal minus discount plus delivery plus
        tax.
      properties:
        currency: { $ref: '#/components/schemas/Currency' }
        subtotal: { $ref: '#/components/schemas/Money' }
        discount: { $ref: '#/components/schemas/Money' }
        delivery: { $ref: '#/components/schemas/Money' }
        tax: { $ref: '#/components/schemas/Money' }
        total: { $ref: '#/components/schemas/Money' }
        deliveryMethod: { $ref: '#/components/schemas/DeliveryMethod' }
        promotion:
          allOf: [{ $ref: '#/components/schemas/AppliedPromotion' }]
          nullable: true
    CheckoutQuoteResponse:
      type: object
      required: [data, meta]
      properties:
        data: { $ref: '#/components/schemas/CheckoutQuoteData' }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    OrderItem:
      type: object
      description: >
        An immutable snapshot of one purchased configuration. Price and every descriptive field
        are copied at placement, so a later catalogue or price change never rewrites the order.
      required:
        [
          id,
          artworkVersionId,
          garmentVariantId,
          placementId,
          scalePresetId,
          view,
          configurationHash,
          quantity,
          unitPrice,
          lineTotal,
          artworkTitle,
          garmentTitle,
          colourName,
          sizeLabel,
          sku,
        ]
      properties:
        id: { type: string, format: uuid }
        artworkVersionId: { type: string, format: uuid }
        garmentVariantId: { type: string, format: uuid }
        placementId: { type: string, format: uuid }
        scalePresetId: { type: string, format: uuid }
        view: { type: string, enum: [FRONT, BACK] }
        configurationHash: { type: string }
        quantity: { type: integer, minimum: 1 }
        unitPrice: { $ref: '#/components/schemas/Money' }
        lineTotal: { $ref: '#/components/schemas/Money' }
        artworkTitle: { type: string }
        garmentTitle: { type: string }
        colourName: { type: string }
        sizeLabel: { type: string }
        sku: { type: string }
    OrderContact:
      type: object
      required: [email, name, phone]
      properties:
        email: { type: string, format: email }
        name: { type: string }
        phone: { type: string, nullable: true }
    OrderAddress:
      type: object
      required: [state, city, line1, line2, postcode]
      properties:
        state: { type: string }
        city: { type: string }
        line1: { type: string }
        line2: { type: string, nullable: true }
        postcode: { type: string, nullable: true }
    OrderTimelineEntry:
      type: object
      required: [status, at, reason]
      properties:
        status: { $ref: '#/components/schemas/OrderStatus' }
        at: { type: string, format: date-time }
        reason: { type: string, nullable: true }
    OrderPaymentHandoff:
      type: object
      required: [status, provider, reference, redirectUrl]
      description: >
        The payment handoff. TMS-B4-003 always reports a status derived from the order with no
        provider; TMS-B5-001 populates the provider, reference, and redirect.
      properties:
        status: { $ref: '#/components/schemas/PaymentStatus' }
        provider: { type: string, nullable: true }
        reference: { type: string, nullable: true }
        redirectUrl: { type: string, nullable: true }
    OrderSummary:
      type: object
      required: [reference, status, placedAt, itemCount, total, currency]
      properties:
        reference: { type: string }
        status: { $ref: '#/components/schemas/OrderStatus' }
        placedAt: { type: string, format: date-time }
        itemCount: { type: integer, minimum: 0 }
        total: { $ref: '#/components/schemas/Money' }
        currency: { $ref: '#/components/schemas/Currency' }
    OrderData:
      type: object
      required:
        [
          reference,
          status,
          placedAt,
          updatedAt,
          contact,
          address,
          deliveryMethod,
          items,
          currency,
          subtotal,
          discount,
          delivery,
          tax,
          total,
          promotion,
          payment,
          timeline,
        ]
      properties:
        reference: { type: string }
        status: { $ref: '#/components/schemas/OrderStatus' }
        placedAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        contact: { $ref: '#/components/schemas/OrderContact' }
        address: { $ref: '#/components/schemas/OrderAddress' }
        deliveryMethod: { $ref: '#/components/schemas/DeliveryMethod' }
        items:
          type: array
          items: { $ref: '#/components/schemas/OrderItem' }
        currency: { $ref: '#/components/schemas/Currency' }
        subtotal: { $ref: '#/components/schemas/Money' }
        discount: { $ref: '#/components/schemas/Money' }
        delivery: { $ref: '#/components/schemas/Money' }
        tax: { $ref: '#/components/schemas/Money' }
        total: { $ref: '#/components/schemas/Money' }
        promotion:
          allOf: [{ $ref: '#/components/schemas/AppliedPromotion' }]
          nullable: true
        payment:
          allOf: [{ $ref: '#/components/schemas/OrderPaymentHandoff' }]
          nullable: true
        timeline:
          type: array
          items: { $ref: '#/components/schemas/OrderTimelineEntry' }
    OrderResponse:
      type: object
      required: [data, meta]
      properties:
        data: { $ref: '#/components/schemas/OrderData' }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    OrderListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/OrderSummary' }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    InventoryReceiptInput:
      type: object
      additionalProperties: false
      required: [quantity]
      properties:
        quantity: { type: integer, minimum: 1, maximum: 100000 }
        reason: { type: string, minLength: 1, maxLength: 500 }
        reference: { type: string, minLength: 1, maxLength: 200 }
    InventoryAdjustmentInput:
      type: object
      additionalProperties: false
      required: [quantityDelta, reason]
      description: >
        A signed correction. Zero is rejected because a movement that moves nothing is not a
        record. A RETURN must add stock and DAMAGE must remove it. An adjustment can never take
        stock below zero, nor below the quantity currently held by live reservations.
      properties:
        quantityDelta: { type: integer, minimum: -100000, maximum: 100000 }
        reason: { type: string, minLength: 1, maxLength: 500 }
        kind: { type: string, enum: [ADJUSTMENT, RETURN, DAMAGE], default: ADJUSTMENT }
        reference: { type: string, minLength: 1, maxLength: 200 }
    InventoryThresholdInput:
      type: object
      additionalProperties: false
      required: [lowStockThreshold]
      properties:
        lowStockThreshold: { type: integer, minimum: 0, maximum: 100000 }
    StockLevelData:
      type: object
      required: [variantId, sku, onHand, reserved, available, lowStockThreshold, lowStock]
      description: >
        available is onHand minus the quantity held by live reservations. A reservation reduces
        availability without moving stock, so onHand changes only on a receipt, an adjustment,
        or a committed sale.
      properties:
        variantId: { type: string, format: uuid }
        sku: { type: string }
        onHand: { type: integer, minimum: 0 }
        reserved: { type: integer, minimum: 0 }
        available: { type: integer }
        lowStockThreshold: { type: integer, minimum: 0 }
        lowStock: { type: boolean }
    StockMovement:
      type: object
      required: [id, kind, quantityDelta, onHandAfter, createdAt]
      properties:
        id: { type: string, format: uuid }
        kind: { type: string, enum: [RECEIPT, ADJUSTMENT, SALE, RETURN, DAMAGE] }
        quantityDelta: { type: integer }
        onHandAfter: { type: integer, minimum: 0 }
        reason: { type: string, nullable: true }
        reference: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
    StockLevelResponse:
      type: object
      required: [data, meta]
      properties:
        data: { $ref: '#/components/schemas/StockLevelData' }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    StockLevelListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/DesignConfiguration' }
          items: { $ref: '#/components/schemas/StockLevelData' }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    StockMovementListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/StockMovement' }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    HealthResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [status, service, timestamp]
          properties:
            status: { type: string, const: ok }
            service: { type: string, const: api }
            timestamp: { type: string, format: date-time }
        meta:
          $ref: '#/components/schemas/ApiMeta'
    ApiMeta:
      type: object
      required: [correlationId]
      properties:
        correlationId: { type: string }
    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, correlationId]
          properties:
            code:
              type: string
              enum:
                [
                  VALIDATION_FAILED,
                  AUTHENTICATION_REQUIRED,
                  AUTHENTICATION_INVALID,
                  EMAIL_VERIFICATION_REQUIRED,
                  TOKEN_INVALID_OR_EXPIRED,
                  SESSION_INVALID,
                  ADMIN_MFA_REQUIRED,
                  MFA_CHALLENGE_INVALID,
                  MFA_CODE_INVALID,
                  PERMISSION_DENIED,
                  RESOURCE_NOT_FOUND,
                  CONFLICT,
                  RATE_LIMITED,
                  IDEMPOTENCY_CONFLICT,
                  INVENTORY_UNAVAILABLE,
                  PROMOTION_INVALID,
                  CONFIGURATION_NOT_APPROVED,
                  MEDIA_VALIDATION_FAILED,
                  MEDIA_INFECTED,
                  MEDIA_PROCESSING_FAILED,
                  INTEGRATION_UNAVAILABLE,
                  INTERNAL_ERROR,
                ]
            message: { type: string }
            correlationId: { type: string }
