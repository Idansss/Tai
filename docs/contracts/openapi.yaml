      summary: Read an unlisted design by its stable share token
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string, minLength: 32, maxLength: 64 }
      responses:
        '200': { $ref: '#/components/responses/Design' }
        '404': { $ref: '#/components/responses/ApiError' }
components:
  parameters:
    Cursor:
      name: cursor
      in: query
      schema: { type: string, format: uuid }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    CatalogueId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    DesignId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    CatalogueSlug:
      name: slug
      in: path
      required: true
      schema: { type: string, maxLength: 160, pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$' }
    ArtworkId:
      name: artworkId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ArtworkVersionId:
      name: versionId
      in: path
      required: true
      schema: { type: string, format: uuid }
    GarmentTemplateId:
      name: templateId
      in: path
      required: true
      schema: { type: string, format: uuid }
    GarmentPlacementId:
      name: placementId
      in: path
      required: true
      schema: { type: string, format: uuid }
    CompatibilityArtworkVersionId:
      name: artworkVersionId
      in: path
      required: true
      schema: { type: string, format: uuid }
  requestBodies:
    GarmentColour:
      required: true
      content:
        application/json:
          schema: { $ref: '#/components/schemas/GarmentColourInput' }
    GarmentSize:
      required: true
      content:
        application/json:
          schema: { $ref: '#/components/schemas/GarmentSizeInput' }
    GarmentVariant:
      required: true
      content:
        application/json:
          schema: { $ref: '#/components/schemas/GarmentVariantInput' }
    GarmentPlacement:
      required: true
      content:
        application/json:
          schema: { $ref: '#/components/schemas/GarmentPlacementInput' }
    GarmentScalePreset:
      required: true
      content:
        application/json:
          schema: { $ref: '#/components/schemas/GarmentScalePresetInput' }
    GarmentCompatibility:
      required: true
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ArtworkGarmentCompatibilityInput' }
  securitySchemes:
    tms_session:
      type: apiKey
      in: cookie
      name: tms_session
    tms_admin_session:
      type: apiKey
      in: cookie
      name: tms_admin_session
  responses:
    ApiError:
      description: The request could not be completed.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
    Tag:
      description: Catalogue tag.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/TagResponse' }
    TagList:
      description: Catalogue tags.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/TagListResponse' }
    CatalogueEntry:
      description: Curated collection.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/CatalogueEntryResponse' }
    CatalogueList:
      description: Curated collections.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/CatalogueListResponse' }
    CataloguePage:
      description: Cursor page of published curated collections.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/CataloguePageResponse' }
    Drop:
      description: Timed drop.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/DropResponse' }
    DropList:
      description: Timed drops.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/DropListResponse' }
    DropPage:
      description: Cursor page of published timed drops.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/DropPageResponse' }
    Edition:
      description: Artwork edition.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/EditionResponse' }
    EditionList:
      description: Artwork editions.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/EditionListResponse' }
    Story:
      description: Editorial story with ordered blocks.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/StoryResponse' }
    StoryList:
      description: Editorial stories.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/StoryListResponse' }
    StoryPage:
      description: Cursor page of published editorial stories.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/StoryPageResponse' }
    Association:
      description: Artwork association.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/AssociationResponse' }
    Garment:
      description: Garment canvas and options.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/GarmentResponse' }
    GarmentList:
      description: Garment canvases in every lifecycle state.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/GarmentListResponse' }
    GarmentPage:
      description: Cursor page of published garment canvases.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/GarmentPageResponse' }
    GarmentMember:
      description: A garment option or compatibility record.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/GarmentMemberResponse' }
    ArtworkGarmentCompatibilityList:
      description: Approved garment canvases and placements for an artwork.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ArtworkGarmentCompatibilityListResponse' }
    GarmentConfigurationValidation:
      description: Exact approved garment configuration validation result.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/GarmentConfigurationValidationResponse' }
    Design:
      description: One saved design configuration.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/DesignResponse' }
    DesignList:
      description: Saved designs owned by the authenticated customer.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/DesignListResponse' }
  schemas:
    CustomerRegistrationInput:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email: { type: string, format: email, maxLength: 320 }
        password: { type: string, format: password, minLength: 12, maxLength: 128 }
        displayName: { type: string, minLength: 1, maxLength: 100 }
    CustomerLoginInput:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email: { type: string, format: email, maxLength: 320 }
        password: { type: string, format: password, minLength: 1, maxLength: 128 }
    AuthEmailInput:
      type: object
      additionalProperties: false
      required: [email]
      properties:
        email: { type: string, format: email, maxLength: 320 }
    AuthTokenInput:
      type: object
      additionalProperties: false
      required: [token]
      properties:
        token: { type: string, minLength: 43, maxLength: 43, pattern: '^[A-Za-z0-9_-]{43}$' }
    PasswordResetConfirmationInput:
      type: object
      additionalProperties: false
      required: [token, password]
      properties:
        token: { type: string, minLength: 43, maxLength: 43, pattern: '^[A-Za-z0-9_-]{43}$' }
        password: { type: string, format: password, minLength: 12, maxLength: 128 }
    AuthUser:
      type: object
      required: [id, email, status, emailVerifiedAt, displayName]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        status: { type: string, enum: [PENDING_VERIFICATION, ACTIVE] }
        emailVerifiedAt: { type: [string, 'null'], format: date-time }
        displayName: { type: [string, 'null'] }
    AuthSession:
      type: object
      required: [id, expiresAt, user]
      properties:
        id: { type: string, format: uuid }
        expiresAt: { type: string, format: date-time }
        user: { $ref: '#/components/schemas/AuthUser' }
    AuthSessionResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [session]
          properties:
            session: { $ref: '#/components/schemas/AuthSession' }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    AuthRegistrationResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [user, verificationRequired]
          properties:
            user: { $ref: '#/components/schemas/AuthUser' }
            verificationRequired: { type: boolean, const: true }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    AuthAcceptedResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [accepted]
          properties:
            accepted: { type: boolean, const: true }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    AdminLoginInput:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email: { type: string, format: email, maxLength: 320 }
        password: { type: string, format: password, minLength: 1, maxLength: 128 }
    AdminMfaChallengeInput:
      type: object
      additionalProperties: false
      required: [challengeToken]
      properties:
        challengeToken:
          { type: string, minLength: 43, maxLength: 43, pattern: '^[A-Za-z0-9_-]{43}$' }
    AdminMfaCodeInput:
      type: object
      additionalProperties: false
      required: [challengeToken, code]
      properties:
        challengeToken:
          { type: string, minLength: 43, maxLength: 43, pattern: '^[A-Za-z0-9_-]{43}$' }
        code: { type: string, pattern: '^\d{6}$' }
    AdminRoleAssignmentInput:
      type: object
      additionalProperties: false
      properties:
        expiresAt: { type: [string, 'null'], format: date-time }
    AdminUser:
      type: object
      required: [id, email, name, roles, permissions, mfaRequired, mfaEnrolled]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        name: { type: string, minLength: 1, maxLength: 100 }
        roles:
          type: array
          uniqueItems: true
          items: { type: string }
        permissions:
          type: array
          uniqueItems: true
          items: { type: string, pattern: '^[a-z][a-z0-9_]*\.[a-z][a-z0-9_]*$' }
        mfaRequired: { type: boolean }
        mfaEnrolled: { type: boolean }
    AdminSession:
      type: object
      required: [id, expiresAt, assuranceLevel, user]
      properties:
        id: { type: string, format: uuid }
        expiresAt: { type: string, format: date-time }
        assuranceLevel: { type: string, enum: [PASSWORD, MFA] }
        user: { $ref: '#/components/schemas/AdminUser' }
    AdminAuthChallenge:
      type: object
      required: [status, challengeToken, expiresAt]
      properties:
        status: { type: string, enum: [MFA_ENROLLMENT_REQUIRED, MFA_REQUIRED] }
        challengeToken: { type: string, minLength: 43, maxLength: 43 }
        expiresAt: { type: string, format: date-time }
    AdminLoginResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          oneOf:
            - type: object
              additionalProperties: false
              required: [session]
              properties:
                session: { $ref: '#/components/schemas/AdminSession' }
            - type: object
              additionalProperties: false
              required: [challenge]
              properties:
                challenge: { $ref: '#/components/schemas/AdminAuthChallenge' }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    AdminSessionResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [session]
          properties:
            session: { $ref: '#/components/schemas/AdminSession' }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    AdminTotpEnrollmentResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [enrollment]
          properties:
            enrollment:
              type: object
              required: [secret, otpauthUri]
              properties:
                secret: { type: string, pattern: '^[A-Z2-7]+$' }
                otpauthUri: { type: string, format: uri }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    AdminRole:
      type: object
      required: [code, name, description, permissions]
      properties:
        code: { type: string }
        name: { type: string }
        description: { type: [string, 'null'] }
        permissions:
          type: array
          uniqueItems: true
          items: { type: string }
    AdminRolesResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [roles]
          properties:
            roles:
              type: array
              items: { $ref: '#/components/schemas/AdminRole' }
        meta: { $ref: '#/components/schemas/ApiMeta' }
    TagKind:
      type: string
      enum: [GENERAL, THEME, MOOD, COLOUR_FAMILY]
    TagInput:
      type: object
      additionalProperties: false
      required: [slug, name]
      properties:
        slug: { type: string, maxLength: 100, pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$' }
        name: { type: string, minLength: 1, maxLength: 100 }
        kind: { $ref: '#/components/schemas/TagKind' }
    Tag:
      allOf:
        - $ref: '#/components/schemas/TagInput'
        - type: object
          required: [id, kind]
          properties:
            id: { type: string, format: uuid }
            kind: { $ref: '#/components/schemas/TagKind' }
    CatalogueEntryInput:
      type: object
      additionalProperties: false
      required: [slug, title]
      properties:
        slug: { type: string, maxLength: 160, pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$' }
        title: { type: string, minLength: 1, maxLength: 200 }
        description: { type: [string, 'null'], maxLength: 10000 }
    CatalogueEntryUpdateInput:
      type: object
      additionalProperties: false
      properties:
        slug: { type: string, maxLength: 160, pattern: '^[a-z0-9]+(?:-[a-z0-9]+)*$' }
        title: { type: string, minLength: 1, maxLength: 200 }
        description: { type: [string, 'null'], maxLength: 10000 }
        status: { $ref: '#/components/schemas/ArtworkStatus' }
    ArtworkAssociation:
      type: object
      required: [artworkId, position]
      properties:
        artworkId: { type: string, format: uuid }
        position: { type: integer, minimum: 0 }
    AssociationInput:
      type: object
      additionalProperties: false
      properties:
        position: { type: integer, minimum: 0, default: 0 }
    CatalogueEntry:
      allOf:
        - $ref: '#/components/schemas/CatalogueEntryInput'
        - type: object
          required: [id, status, artworks, publishedAt, archivedAt]
          properties:
            id: { type: string, format: uuid }
            status: { $ref: '#/components/schemas/ArtworkStatus' }
            artworks:
              type: array
              items: { $ref: '#/components/schemas/ArtworkAssociation' }
            publishedAt: { type: [string, 'null'], format: date-time }
            archivedAt: { type: [string, 'null'], format: date-time }
    DropInput:
      allOf:
        - $ref: '#/components/schemas/CatalogueEntryInput'
        - type: object
          properties:
            startsAt: { type: [string, 'null'], format: date-time }
            endsAt: { type: [string, 'null'], format: date-time }
